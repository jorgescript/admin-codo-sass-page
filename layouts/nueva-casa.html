<!DOCTYPE html>

<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#adc6ff",
                        "on-tertiary-fixed-variant": "#004395",
                        "on-secondary": "#ffffff",
                        "outline": "#76777d",
                        "surface-container-highest": "#e0e3e5",
                        "surface": "#f7f9fb",
                        "tertiary-fixed": "#d8e2ff",
                        "on-tertiary-fixed": "#001a42",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed": "#d5e3fd",
                        "on-secondary-fixed-variant": "#3a485c",
                        "tertiary-container": "#001a42",
                        "on-error-container": "#93000a",
                        "secondary": "#515f74",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#3980f4",
                        "on-secondary-container": "#57657b",
                        "inverse-surface": "#2d3133",
                        "secondary-fixed-dim": "#b9c7e0",
                        "surface-variant": "#e0e3e5",
                        "surface-bright": "#f7f9fb",
                        "on-secondary-fixed": "#0d1c2f",
                        "primary-container": "#131b2e",
                        "outline-variant": "#c6c6cd",
                        "on-primary-fixed": "#131b2e",
                        "on-primary-container": "#7c839b",
                        "on-surface-variant": "#45464d",
                        "primary": "#000000",
                        "primary-fixed-dim": "#bec6e0",
                        "on-surface": "#191c1e",
                        "tertiary": "#000000",
                        "error-container": "#ffdad6",
                        "secondary-container": "#d5e3fd",
                        "error": "#ba1a1a",
                        "surface-container-high": "#e6e8ea",
                        "inverse-primary": "#bec6e0",
                        "on-primary-fixed-variant": "#3f465c",
                        "on-background": "#191c1e",
                        "background": "#f7f9fb",
                        "surface-tint": "#565e74",
                        "inverse-on-surface": "#eff1f3",
                        "surface-container": "#eceef0",
                        "surface-dim": "#d8dadc",
                        "primary-fixed": "#dae2fd",
                        "on-error": "#ffffff",
                        "surface-container-low": "#f2f4f6",
                        "on-primary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "lg": "24px",
                        "xl": "32px",
                        "xs": "4px",
                        "margin": "32px",
                        "base": "4px",
                        "gutter": "24px",
                        "sm": "8px",
                        "md": "16px"
                    },
                    "fontFamily": {
                        "body-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-xl": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "body-sm": ["13px", { "lineHeight": "18px", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-sm": ["11px", { "lineHeight": "14px", "fontWeight": "500" }],
                        "headline-xl": ["30px", { "lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-background text-on-background min-h-screen">
    <aside class="fixed left-0 top-0 h-screen w-[280px] border-r bg-slate-50 border-slate-200 z-50">
    </aside>
    <header </header>
        <main class="ml-[280px] pt-[72px] p-xl bg-background min-h-screen">
            <div class="max-w-6xl mx-auto">
                <div class="mb-lg">
                    <h2 class="font-headline-xl text-on-surface">Agregar Nueva Casa</h2>
                    <p class="font-body-md text-on-surface-variant">Complete el formulario para registrar una nueva
                        unidad
                        residencial en el sistema.</p>
                </div>
                <div class="grid grid-cols-12 gap-gutter">
                    <div class="col-span-12 lg:col-span-7">
                        <div
                            class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg shadow-sm">
                            <div class="flex items-center gap-2 mb-xl">
                                <span class="material-symbols-outlined text-on-tertiary-container"
                                    data-icon="assignment">assignment</span>
                                <h3 class="font-headline-md">Datos de la Unidad</h3>
                            </div>
                            <form class="space-y-lg">
                                <div class="grid grid-cols-2 gap-md">
                                    <div class="col-span-2 md:col-span-1">
                                        <label class="block font-label-md text-on-surface-variant mb-xs">Número de
                                            casa</label>
                                        <input
                                            class="w-full px-md py-sm border border-outline-variant rounded-lg font-body-md focus:border-on-tertiary-container focus:ring-1 focus:ring-on-tertiary-container transition-all outline-none"
                                            placeholder="Ej. A-102" type="text" />
                                    </div>
                                    <div class="col-span-2 md:col-span-1">
                                        <label class="block font-label-md text-on-surface-variant mb-xs">Tipo de
                                            Propiedad</label>
                                        <select
                                            class="w-full px-md py-sm border border-outline-variant rounded-lg font-body-md focus:border-on-tertiary-container focus:ring-1 focus:ring-on-tertiary-container outline-none">
                                            <option>Residencial</option>
                                            <option>Comercial</option>
                                            <option>Penthouse</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="border-t border-surface-container-highest my-xl"></div>
                                <div>
                                    <label class="block font-label-md text-on-surface-variant mb-xs">Nombre del
                                        propietario</label>
                                    <input
                                        class="w-full px-md py-sm border border-outline-variant rounded-lg font-body-md focus:border-on-tertiary-container focus:ring-1 focus:ring-on-tertiary-container transition-all outline-none"
                                        placeholder="Nombre completo" type="text" />
                                </div>
                                <div class="grid grid-cols-2 gap-md">
                                    <div class="col-span-2 md:col-span-1">
                                        <label
                                            class="block font-label-md text-on-surface-variant mb-xs">Teléfono</label>
                                        <div class="relative">
                                            <span
                                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"
                                                data-icon="phone">phone</span>
                                            <input
                                                class="w-full pl-10 pr-md py-sm border border-outline-variant rounded-lg font-body-md focus:border-on-tertiary-container focus:ring-1 focus:ring-on-tertiary-container outline-none"
                                                placeholder="+1 (555) 000-0000" type="tel" />
                                        </div>
                                    </div>
                                    <div class="col-span-2 md:col-span-1">
                                        <label class="block font-label-md text-on-surface-variant mb-xs">Email</label>
                                        <div class="relative">
                                            <span
                                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"
                                                data-icon="mail">mail</span>
                                            <input
                                                class="w-full pl-10 pr-md py-sm border border-outline-variant rounded-lg font-body-md focus:border-on-tertiary-container focus:ring-1 focus:ring-on-tertiary-container outline-none"
                                                placeholder="correo@ejemplo.com" type="email" />
                                        </div>
                                    </div>
                                </div>
                                <div class="pt-xl flex gap-md">
                                    <button
                                        class="flex-1 bg-tertiary-container text-on-tertiary px-lg py-3 rounded-lg font-body-md font-semibold hover:opacity-90 transition-opacity flex items-center justify-center gap-2"
                                        type="submit">
                                        <span class="material-symbols-outlined" data-icon="save">save</span>
                                        Registrar Unidad
                                    </button>
                                    <button
                                        class="px-lg py-3 border border-outline-variant rounded-lg font-body-md text-on-surface-variant hover:bg-surface-container-low transition-colors"
                                        type="button">
                                        Cancelar
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
</body>

</html>
